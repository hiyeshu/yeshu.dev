# [INPUT]: 依赖 GitHub main 分支、npm lockfile、Astro build 和 GitHub Secret CLOUDFLARE_API_TOKEN
# [OUTPUT]: 对外提供 yeshu.dev 生产自动部署，把 dist/ 发布到 Cloudflare Worker yeshu-dev
# [POS]: .github/workflows 的生产发布入口，连接 GitHub push 与 Cloudflare Worker 静态 assets
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md

name: Deploy yeshu.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yeshu-dev-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: 2e46d86d7ad223120aae0ebf077666c8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4.76.0 deploy --config wrangler.jsonc --x-autoconfig false --message "Deploy $GITHUB_SHA"
